name: Scrape K-League Data

on:
  schedule:
    # 매시간 정각 (UTC) → KST는 +9시간
    # K리그 경기는 주말 집중이라 매시간으로 충분
    - cron: '0 * * * *'
  workflow_dispatch:  # 수동 실행 버튼
  push:
    paths:
      - 'scraper/**'
      - '.github/workflows/scrape-kleague.yml'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: cd scraper && npm install --no-package-lock

      - name: Run scraper
        run: cd scraper && node scrape.js
        continue-on-error: true

      - name: Commit & push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "🤖 자동 업데이트 ($(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST'))"
            git push
          fi
