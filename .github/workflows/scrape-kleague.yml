name: Scrape K League Data

on:
  schedule:
    - cron: '0 16 * * *'   # UTC 16:00 = KST 01:00 (매일 새벽 1시)
  workflow_dispatch:        # 콘솔에서 수동 실행 가능
  push:
    paths:
      - 'scraper/**'
      - '.github/workflows/scrape-kleague.yml'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package-lock.json

      - name: Install deps
        working-directory: scraper
        run: npm ci || npm install

      - name: Run scraper
        working-directory: scraper
        run: npm start

      - name: Commit updated data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no data change"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore(data): K리그 data update ${TIMESTAMP}"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # 데이터 변경 시 jsdelivr CDN 캐시 자동 비우기
      # → 사용자가 토스 앱 열면 항상 최신 데이터 자동 반영
      - name: Purge jsdelivr cache
        if: steps.commit.outputs.changed == 'true'
        run: |
          sleep 15
          for f in standings scorers assists schedule meta; do
            echo "Purging $f.json ..."
            curl -fsS "https://purge.jsdelivr.net/gh/officealone00/kleague-app@main/data/$f.json" || true
            echo ""
          done
